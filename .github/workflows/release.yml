name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 构建目标二进制
        run: cargo build -p xycli --release --locked --target ${{ matrix.target }}

      - name: 打包 Unix 产物并生成校验和
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          archive="xycli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" xycli
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: 打包 Windows 产物并生成校验和
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "xycli-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/xycli.exe" -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "$archive.sha256"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: xycli-${{ matrix.target }}
          path: |
            xycli-*
